<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Search Repositories</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--color-bg,#0d1117);color:var(--color-text,#e6edf3);
      padding:16px;font-size:14px}
    .header{display:flex;align-items:center;gap:8px;margin-bottom:14px;
      padding-bottom:10px;border-bottom:1px solid #30363d}
    .header-icon{color:#58a6ff}
    .search-bar{display:flex;gap:8px;margin-bottom:14px}
    .search-input{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;
      padding:8px 12px;color:#e6edf3;font-size:0.88rem;outline:none}
    .search-input:focus{border-color:#58a6ff}
    .btn{padding:8px 16px;border-radius:6px;border:1px solid;
      font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s}
    .btn-primary{background:#238636;border-color:#2ea043;color:#fff}
    .btn-primary:hover:not(:disabled){background:#2ea043}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .repo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
    .repo-card{background:#161b22;border:1px solid #30363d;border-radius:10px;
      padding:14px;display:flex;flex-direction:column;gap:8px;transition:border-color 0.15s}
    .repo-card:hover{border-color:#58a6ff}
    .repo-name{font-size:0.92rem;font-weight:700;color:#58a6ff;
      text-decoration:none;font-family:"SF Mono",Menlo,monospace}
    .repo-name:hover{text-decoration:underline}
    .repo-desc{font-size:0.8rem;color:#8b949e;line-height:1.4;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .repo-stats{display:flex;gap:10px;flex-wrap:wrap}
    .repo-stat{font-size:0.75rem;color:#8b949e;display:flex;align-items:center;gap:4px}
    .lang-dot{width:10px;height:10px;border-radius:50%;background:#3572A5;flex-shrink:0}
    .repo-vis{font-size:0.65rem;font-weight:700;text-transform:uppercase;
      background:#21262d;border:1px solid #30363d;border-radius:20px;
      padding:1px 7px;color:#8b949e;margin-left:auto;align-self:flex-start}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #30363d;
      border-top-color:#58a6ff;border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .status{padding:12px 0;color:#8b949e;font-size:0.85rem;
      display:flex;align-items:center;gap:8px}
    .sort-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
    .sort-btn{padding:4px 10px;border-radius:6px;border:1px solid #30363d;
      font-size:0.75rem;cursor:pointer;background:#21262d;color:#8b949e;transition:all 0.15s}
    .sort-btn.active,.sort-btn:hover{border-color:#58a6ff;color:#e6edf3}
    .count{font-size:0.78rem;color:#8b949e}
    .open-in-view{font-size:0.72rem;color:#58a6ff;cursor:pointer;
      background:none;border:none;padding:0;margin-top:4px}
    .open-in-view:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div id="root"><div class="status"><span class="spinner"></span> Loading…</div></div>

  <script type="module">
    let _id = 1;
    const pending = new Map();
    let hostOrigin = '*';

    function rpc(method, params = {}) {
      return new Promise((resolve, reject) => {
        const id = _id++;
        pending.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: '2.0', id, method, params }, hostOrigin);
        setTimeout(() => { pending.delete(id); reject(new Error('timeout')); }, 30000);
      });
    }

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg || msg.jsonrpc !== '2.0') return;
      if (msg.id !== undefined && pending.has(msg.id)) {
        const { resolve, reject } = pending.get(msg.id);
        pending.delete(msg.id);
        if (msg.error) reject(new Error(msg.error.message));
        else resolve(msg.result);
      }
      if (msg.id === undefined && msg.method === 'ui/notifications/tool-result') handleToolResult(msg.params);
    });

    const callTool = (name, args) => rpc('tools/call', { name, arguments: args });

    async function init() {
      let ctx = {};
      try { ctx = await rpc('ui/initialize', { name: 'github-search-view', version: '1.0' }); } catch(e) {}
      if (ctx.origin) hostOrigin = ctx.origin;
      window.parent.postMessage(
        { jsonrpc: '2.0', method: 'ui/notifications/initialized', params: {} },
        hostOrigin
      );
    }

    let repos = [], query = '', sortBy = 'stars', searching = false;

    function handleToolResult(params) {
      const payload = params?.result ?? params;
      const items = payload?.items || payload?.repositories || (Array.isArray(payload) ? payload : null);
      if (items) { repos = items; query = payload?.query || query; render(); }
    }

    function render() {
      const root = document.getElementById('root');
      const sorted = [...repos].sort((a,b) => {
        if (sortBy === 'stars') return (b.stargazers_count||0)-(a.stargazers_count||0);
        if (sortBy === 'forks') return (b.forks_count||0)-(a.forks_count||0);
        if (sortBy === 'updated') return new Date(b.updated_at||0)-new Date(a.updated_at||0);
        return 0;
      });

      root.innerHTML = `
        <div class="header">
          <span class="header-icon">🔍</span>
          <span style="font-size:0.95rem;font-weight:600">Repository Search</span>
        </div>
        <div class="search-bar">
          <input class="search-input" id="q-input" placeholder="Search repositories…" value="${query}"/>
          <button class="btn btn-primary" id="search-btn" ${searching?'disabled':''}>
            ${searching?'<span class="spinner"></span>':'Search'}
          </button>
        </div>
        <div class="sort-bar">
          <span class="count">${repos.length} results</span>
          <span style="color:#8b949e;font-size:0.75rem">Sort:</span>
          <button class="sort-btn ${sortBy==='stars'?'active':''}" data-sort="stars">⭐ Stars</button>
          <button class="sort-btn ${sortBy==='forks'?'active':''}" data-sort="forks">🍴 Forks</button>
          <button class="sort-btn ${sortBy==='updated'?'active':''}" data-sort="updated">🕐 Updated</button>
        </div>
        <div class="repo-grid">
          ${sorted.map(r => `
            <div class="repo-card">
              <div style="display:flex;align-items:center;gap:8px">
                <a class="repo-name" href="${r.html_url||'#'}" target="_blank">${r.full_name||r.name||''}</a>
                <span class="repo-vis">${r.private?'private':'public'}</span>
              </div>
              ${r.description?`<p class="repo-desc">${r.description}</p>`:''}
              <div class="repo-stats">
                ${r.language?`<span class="repo-stat"><span class="lang-dot"></span>${r.language}</span>`:''}
                <span class="repo-stat">⭐ ${(r.stargazers_count||0).toLocaleString()}</span>
                <span class="repo-stat">🍴 ${(r.forks_count||0).toLocaleString()}</span>
                ${r.open_issues_count?`<span class="repo-stat">◎ ${r.open_issues_count}</span>`:''}
              </div>
              <button class="open-in-view" data-repo="${r.full_name}">Open in detail view →</button>
            </div>`).join('')}
        </div>`;

      document.getElementById('search-btn').onclick = doSearch;
      document.getElementById('q-input').onkeydown = e => { if(e.key==='Enter') doSearch(); };
      document.querySelectorAll('.sort-btn').forEach(b =>
        b.addEventListener('click', () => { sortBy = b.dataset.sort; render(); }));
      document.querySelectorAll('.open-in-view').forEach(b =>
        b.addEventListener('click', () => openInChat(b.dataset.repo)));
    }

    async function doSearch() {
      const q = document.getElementById('q-input')?.value?.trim();
      if (!q) return;
      query = q; searching = true; render();
      try {
        const res = await callTool('search_repositories', { query: q });
        const text = res.content?.find(c=>c.type==='text')?.text;
        if (text) { repos = JSON.parse(text).items || JSON.parse(text); render(); }
      } catch(e){console.error(e)} finally { searching = false; render(); }
    }

    function openInChat(repoName) {
      window.parent.postMessage({ jsonrpc: '2.0', method: 'ui/message',
        params: { message: `Get details about ${repoName}` } }, hostOrigin);
    }

    init().catch(console.warn);
  </script>
</body>
</html>
