name: CI — Lint & Test

on:
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies (incl. dev)
        working-directory: rag-app
        run: uv sync

      - name: Run tests
        working-directory: rag-app
        run: uv run pytest

  bob-review:
    name: Bob PR Review
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --pm npm
          # Add npm global bin to PATH for subsequent steps
          echo "$(npm root -g)/../bin" >> $GITHUB_PATH

      - name: Bob — review this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BOB_API_KEY: ${{ secrets.BOB_API_KEY }}
        run: |
          # Verify bob is reachable
          which bob || { echo "bob not found on PATH: $PATH"; exit 1; }
          echo ${{secrets.GITHUB_TOKEN}}
          echo ${{secrets.BOB_API_KEY}}

          # Explicitly export so child processes inherit it
          export BOBSHELL_API_KEY="${BOBSHELL_API_KEY}"

          # Debug: confirm secret is non-empty (value stays masked in logs)
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "ERROR: BOBSHELL_API_KEY is empty."
            echo "Check: GitHub → Settings → Secrets → Actions → secret named exactly 'BOBSHELL_API_KEY'"
            exit 1
          else
            echo "BOBSHELL_API_KEY is set (${#BOBSHELL_API_KEY} chars)"
          fi

          DIFF=$(git diff $BASE_SHA...$HEAD_SHA --stat)

          bob --auth-method api-key -p "
          You are doing a code review for PR #${PR_NUMBER}: '${PR_TITLE}'.

          Files changed:
          ${DIFF}

          Please review the changes in this PR. Focus on:
          1. Code quality and best practices
          2. Security concerns (especially around secrets or env vars)
          3. Docker and Kubernetes manifest correctness
          4. GitHub Actions workflow correctness
          5. Python code quality

          Post your review as a comment on PR #${PR_NUMBER} in the repository
          hagsmand/techxchange2-2026-automation using the GitHub MCP tool
          add_issue_comment.
          " 2>&1
